name: Update Echola Cask

on:
  schedule:
    - cron: '0 */1 * * *' 
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for new release
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(gh release view --repo saltbo/echola-releases --json tagName --jq '.tagName' | sed 's/^v//')
          CURRENT=$(grep 'version "' Casks/echola.rb | head -1 | sed 's/.*version "//;s/"//')
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "current=${CURRENT}" >> "$GITHUB_OUTPUT"
          if [ "$LATEST" = "$CURRENT" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute SHA256
        if: steps.check.outputs.skip == 'false'
        id: sha
        run: |
          VERSION="${{ steps.check.outputs.latest }}"
          SHA=$(curl -sL "https://github.com/saltbo/echola-releases/releases/download/v${VERSION}/echola-macos-v${VERSION}.dmg" | shasum -a 256 | awk '{print $1}')
          echo "dmg=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Update Cask
        if: steps.check.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.check.outputs.latest }}"
          SHA="${{ steps.sha.outputs.dmg }}"
          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/echola.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA}\"/" Casks/echola.rb

      - name: Commit & push
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/echola.rb
          git commit -m "echola: update to ${{ steps.check.outputs.latest }}"
          git push
